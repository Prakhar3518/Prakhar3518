<svg width="1000" height="180" viewBox="0 0 1000 180" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="space" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"></stop>
      <stop offset="100%" stop-color="#161b22"></stop>
    </linearGradient>
  </defs>

  <style>
    .text {
      font-family: 'Consolas', monospace;
      fill: #c9d1d9;
      font-size: 22px;
    }

    .green {
      fill: #3fb950;
    }

    .blue {
      fill: #58a6ff;
    }

    .cursor {
      animation: blink 1s infinite;
    }

    .star {
      animation: twinkle 3s infinite;
    }

    .planet {
      animation: drift 8s ease-in-out infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    @keyframes twinkle {
      0%,100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    @keyframes drift {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#space)"></rect>

  <!-- Stars -->
  <circle cx="80" cy="40" r="2" fill="white" class="star"></circle>
  <circle cx="150" cy="100" r="1.5" fill="white" class="star"></circle>
  <circle cx="700" cy="50" r="2" fill="white" class="star"></circle>
  <circle cx="850" cy="120" r="1.5" fill="white" class="star"></circle>
  <circle cx="950" cy="70" r="2" fill="white" class="star"></circle>

  <!-- Planet -->
  <g class="planet">
    <circle cx="130" cy="120" r="28" fill="#58a6ff"></circle>
    <ellipse cx="130" cy="120" rx="45" ry="8" fill="none" stroke="#79c0ff" stroke-width="2"></ellipse>
  </g>

  <!-- Footer Terminal Text -->
  <text x="260" y="70" class="text green">
    $ shutdown
  </text>

  <text x="260" y="110" class="text">
    Code committed.
  </text>

  <text x="260" y="140" class="text">
    Changes pushed.
  </text>

  <text x="520" y="140" class="text blue">
    See you in the next deployment 🚀
    <tspan class="cursor">_</tspan>
  </text>

</svg>