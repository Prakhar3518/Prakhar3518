<svg width="1000" height="300" viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"></stop>
      <stop offset="100%" stop-color="#161b22"></stop>
    </linearGradient>
  </defs>

  <style>
    .terminal {
      fill: #0d1117;
      stroke: #30363d;
      stroke-width: 2;
    }

    .header {
      fill: #21262d;
    }

    .text {
      font-family: Consolas, monospace;
      fill: #c9d1d9;
      font-size: 22px;
    }

    .green {
      fill: #3fb950;
    }

    .blue {
      fill: #58a6ff;
    }

    .cursor {
      animation: blink 1s infinite;
    }

    .star1 {
      animation: twinkle 2s infinite;
    }

    .star2 {
      animation: twinkle 3s infinite;
    }

    .planet {
      animation: float 6s ease-in-out infinite;
    }

    .planet2 {
      animation: float 8s ease-in-out infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    @keyframes twinkle {
      0%,100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"></rect>

  <!-- Stars -->
  <circle cx="70" cy="50" r="2" fill="white" class="star1"></circle>
  <circle cx="120" cy="120" r="2" fill="white" class="star2"></circle>
  <circle cx="900" cy="70" r="2" fill="white" class="star1"></circle>
  <circle cx="850" cy="230" r="2" fill="white" class="star2"></circle>
  <circle cx="760" cy="40" r="1.5" fill="white" class="star1"></circle>
  <circle cx="940" cy="170" r="1.5" fill="white" class="star2"></circle>
  <circle cx="40" cy="250" r="1.5" fill="white" class="star2"></circle>
  <circle cx="970" cy="270" r="2" fill="white" class="star1"></circle>

  <!-- Planet Left -->
  <g class="planet">
    <circle cx="120" cy="210" r="35" fill="#58a6ff"></circle>
    <ellipse cx="120" cy="210" rx="55" ry="10" fill="none" stroke="#79c0ff" stroke-width="3"></ellipse>
  </g>

  <!-- Planet Right -->
  <g class="planet2">
    <circle cx="900" cy="90" r="25" fill="#f0883e"></circle>
    <circle cx="890" cy="80" r="4" fill="#ffd8a8"></circle>
    <circle cx="910" cy="100" r="3" fill="#ffd8a8"></circle>
  </g>

  <!-- Terminal -->
  <rect x="220" y="45" width="560" height="210" rx="15" class="terminal"></rect>

  <!-- Terminal Header -->
  <rect x="220" y="45" width="560" height="35" rx="15" class="header"></rect>

  <circle cx="245" cy="63" r="6" fill="#ff5f56"></circle>
  <circle cx="265" cy="63" r="6" fill="#ffbd2e"></circle>
  <circle cx="285" cy="63" r="6" fill="#27c93f"></circle>

  <!-- Content -->
  <text x="250" y="120" class="text green">
    $ whoami
  </text>

  <text x="250" y="155" class="text blue">
    Prakhar Chaudhary
  </text>

  <text x="250" y="200" class="text green">
    $ status
  </text>

  <text x="250" y="235" class="text">
    Building Scalable Backend Systems
    <tspan class="cursor">_</tspan>
  </text>

</svg>